## Github workflow to run new property tests with extra cases after PR approval
##
## Triggered when a PR review is submitted. A gate job checks that the PR has
## reached the required number of approvals (REQUIRED_APPROVALS) before the
## expensive test-discovery job is started.
##
## Discovery strategy:
##   - HEAD branch: list tests from the nextest archive (restored from cache)
##   - Base branch: compile and list tests in a temporary git worktree
##   - New tests = tests in HEAD but not in base (comm -23 on sorted lists)

name: Tests::Proptest Extra

on:
  pull_request_review:
    types:
      - submitted
  workflow_dispatch:
    inputs:
      base_ref:
        description: "Base branch to diff against (default: develop)"
        required: false
        default: "develop"
        type: string

defaults:
  run:
    shell: bash

## One run per PR at a time; do not cancel in progress — a new approval while
## the job is running should queue rather than clobber the current run.
concurrency:
  group: proptest-extra-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

## env vars are transferred to composite action steps
env:
  RUST_BACKTRACE: full
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: 3
  TEST_TIMEOUT: 30
  ## Minimum number of PR approvals required before running the tests
  REQUIRED_APPROVALS: 2

jobs:
  ## Lightweight gate: count current (non-dismissed) approvals on the PR via
  ## the GitHub API and only allow the next job to proceed if the threshold
  ## has been reached. For workflow_dispatch there is no PR context, so the
  ## check is skipped and the job is always considered ready.
  check-approvals:
    name: Check Approval Count
    if: github.event_name == 'workflow_dispatch' || github.event.review.state == 'approved'
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.count.outputs.ready }}
    steps:
      - name: Count current approvals
        id: count
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "workflow_dispatch — skipping approval count check"
            echo "ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR_NUMBER="${{ github.event.pull_request.number }}"

          ## Fetch all reviews and compute the latest state per reviewer.
          ## A user who approved and then dismissed counts as dismissed (not approved).
          count=$(gh api \
            "repos/${{ github.repository }}/pulls/${PR_NUMBER}/reviews" \
            --jq '
              reduce .[] as $r ({};
                .[$r.user.login] = $r.state
              )
              | to_entries
              | map(select(.value == "APPROVED"))
              | length
            ')

          echo "Current approval count: $count (required: ${{ env.REQUIRED_APPROVALS }})"

          if [ "$count" -ge "${{ env.REQUIRED_APPROVALS }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

  proptest-extra:
    name: Run New Proptest Tests
    needs: check-approvals
    ## if: needs.check-approvals.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      ## Setup test environment: checkout HEAD, restore cargo registry cache
      ## and the pre-built nextest archive (saved by create-cache when the PR
      ## was first opened or updated).
      - name: Setup Test Environment
        id: setup_tests
        uses: stacks-network/actions/stacks-core/testenv@main
        with:
          btc-version: "25.0"

      ## If the nextest archive was not in cache (e.g. first run or stale cache),
      ## build it from the HEAD source so subsequent steps can use it.
      - name: Build HEAD nextest archive (cache miss fallback)
        run: |
          if [ ! -f ~/test_archive.tar.zst ]; then
            echo "No cached nextest archive found — building from source"
            cargo nextest archive \
              --archive-file ~/test_archive.tar.zst \
              --workspace \
              --tests \
          else
            echo "Using cached nextest archive."
          fi

      ## List every test present on the HEAD (PR) branch.
      ## Reading from the archive is fast — no recompilation needed.
      - name: List HEAD branch tests
        run: |
          cargo nextest list \
            --archive-file ~/test_archive.tar.zst \
            -Tjson 2>/dev/null \
          | jq -r '
              .["rust-suites"]
              | to_entries[]
              | .value.testcases
              | keys[]
            ' \
          | sort > /tmp/head-tests.txt
          echo "HEAD tests: $(wc -l < /tmp/head-tests.txt)"

      ## Check out the base branch into a temporary git worktree and compile
      ## it to list its tests. The cargo registry cache (restored by testenv)
      ## is shared, so only stacks-core itself needs to be recompiled.
      - name: List base branch tests
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref || inputs.base_ref }}"
          echo "Base branch: $BASE_REF"

          git fetch --depth=1 origin "$BASE_REF"
          git worktree add --detach /tmp/base-worktree "origin/$BASE_REF"

          pushd /tmp/base-worktree
          cargo nextest list -Tjson
          | jq -r '
              .["rust-suites"]
              | to_entries[]
              | .value.testcases
              | keys[]
            ' \
          | sort > /tmp/base-tests.txt
          popd

          ## Remove the worktree; use rm -rf since build artifacts make it dirty
          rm -rf /tmp/base-worktree
          git worktree prune

          echo "Base tests: $(wc -l < /tmp/base-tests.txt)"

      ## comm -23 outputs lines that appear only in file 1 (HEAD) = new tests
      - name: Discover new tests
        id: discover
        run: |
          comm -23 /tmp/head-tests.txt /tmp/base-tests.txt > /tmp/new-tests.txt
          count=$(wc -l < /tmp/new-tests.txt | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "New tests found: $count"
          if [ "$count" -gt 0 ]; then
            cat /tmp/new-tests.txt
          fi

      ## Run each new test individually with an elevated PROPTEST_CASES value.
      ## Non-proptest tests silently ignore this env var, so running them here
      ## is harmless. The step fails if any individual test fails.
      - name: Run new tests (PROPTEST_CASES=2500)
        if: steps.discover.outputs.count != '0'
        timeout-minutes: ${{ fromJSON(env.TEST_TIMEOUT) }}
        env:
          PROPTEST_CASES: 2500
        run: |
          while IFS= read -r test_name || [[ -n "$test_name" ]]; do
            [[ -z "$test_name" ]] && continue
            echo "::group::$test_name"
            cargo nextest run \
              --archive-file ~/test_archive.tar.zst \
              -E "test(=$test_name)"
            echo "::endgroup::"
          done < /tmp/new-tests.txt

      - name: No new tests to run
        if: steps.discover.outputs.count == '0'
        run: echo "No new tests discovered in this PR. Skipping proptest extra run."
